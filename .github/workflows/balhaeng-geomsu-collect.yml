name: 발행검수-수집
# 발행 검수 1단계 — 시트의 카페 링크에서 본문·댓글을 모아 JSON 으로 올린다.
# 그 JSON 을 검수기(team-project/cafe-external/발행본_검수.py)에 넣으면 채점표가 나온다.
#
# ⚠️ 읽기 전용 — 시트도 카페도 쓰지 않는다.
# ⚠️ cron 없음(수동 전용). 자동 가동은 사장님 결정 전까지 안 켠다.
# 차단 회피는 레포 표준(curl_cffi chrome131 + 3.5~5초 간격)을 따른다.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: '수집할 글 수'
        required: false
        default: '30'

concurrency:
  group: balhaeng-geomsu-collect
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ github.token }}

      - name: Setup Python 3.13
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.13'

      - name: Setup venv + install deps
        shell: bash
        run: |
          python -m venv .venv
          ./.venv/bin/python -m pip install --upgrade pip
          ./.venv/bin/python -m pip install -r requirements.txt

      - name: Collect published posts
        shell: bash
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          COLLECT_LIMIT: ${{ github.event.inputs.limit }}
          OUT: 'balhaeng_posts.json'
          PYTHONIOENCODING: 'utf-8'
        run: |
          ./.venv/bin/python -u -m scripts.collect_published_posts

      - name: Upload collected JSON
        uses: actions/upload-artifact@v4
        with:
          name: balhaeng-posts
          path: balhaeng_posts.json
          retention-days: 7
