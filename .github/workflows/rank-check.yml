name: naver-rank-check
# 사장님 D-001: 공개→Private 저장소 + self-hosted runner (가정용 ISP IP, 차단 회피).
# 6시간 cron 4회/일. 사장님 시트 자동 갱신.
# T-M40 (2026-05-12 D-022): self-hosted 우선 + 실패 시 ubuntu-latest fallback 이중화.

on:
  schedule:
    # 매일 KST 00:00, 06:00, 12:00, 18:00 (UTC 기준 15/21/03/09)
    - cron: '0 15,21,3,9 * * *'
  workflow_dispatch:  # 사장님 수동 트리거 (Actions 탭 "Run workflow")

# critic 2026-05-08 Critical 2: cron overlap 방지.
concurrency:
  group: naver-rank-check
  cancel-in-progress: false

jobs:
  # T-M40: 1순위 — self-hosted runner (가정용 ISP IP, 차단 회피 최우선)
  run-cron-primary:
    runs-on: self-hosted
    timeout-minutes: 180
    continue-on-error: true  # 실패해도 fallback job 실행 가능하도록

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Setup venv + install deps
        shell: bash
        run: |
          python -m venv .venv
          ./.venv/bin/python -m pip install --upgrade pip
          ./.venv/bin/python -m pip install -r requirements.txt

      - name: Run cron cycle
        id: run_cycle
        shell: bash
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          NAVER_SLOWDOWN_BASE_SEC: '5.0'
          NAVER_SLOWDOWN_MAX_SEC: '120'
          PYTHONIOENCODING: 'utf-8'
        run: |
          ./.venv/bin/python -u -m src.main

      - name: Post summary to issue #1
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_STATUS: ${{ steps.run_cycle.outcome }}
        run: |
          ./.venv/bin/python -u scripts/post_summary_to_issue.py

      - name: Send email to 사장님 (yoongu777@gmail.com)
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "[naver-rank-checker] cron 결과 (self-hosted) = ${{ steps.run_cycle.outcome }} (${{ github.run_id }})"
          from: naver-rank-checker <${{ secrets.GMAIL_USER }}>
          to: yoongu777@gmail.com
          body: |
            cron 실행 결과 (self-hosted): ${{ steps.run_cycle.outcome }}

            Run URL: https://github.com/yoohojong/naver-rank-checker/actions/runs/${{ github.run_id }}

            상세 결과 + 셀 갱신 통계는 위 URL 또는 사장님 시트 확인.
            (issue #1 댓글에도 자동 알림 추가됨)

  # T-M40: 2순위 — ubuntu-latest fallback (self-hosted 실패/offline 시 자동 실행)
  run-cron-fallback:
    runs-on: ubuntu-latest
    needs: run-cron-primary
    if: failure()  # primary job 실패 시에만 실행
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Setup venv + install deps
        shell: bash
        run: |
          python -m venv .venv
          ./.venv/bin/python -m pip install --upgrade pip
          ./.venv/bin/python -m pip install -r requirements.txt

      - name: Run cron cycle (fallback)
        id: run_cycle
        shell: bash
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          NAVER_SLOWDOWN_BASE_SEC: '5.0'
          NAVER_SLOWDOWN_MAX_SEC: '120'
          PYTHONIOENCODING: 'utf-8'
        run: |
          ./.venv/bin/python -u -m src.main

      - name: Post summary to issue #1
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_STATUS: ${{ steps.run_cycle.outcome }}
        run: |
          ./.venv/bin/python -u scripts/post_summary_to_issue.py

      - name: Send email to 사장님 (yoongu777@gmail.com)
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "[naver-rank-checker] cron 결과 (fallback/ubuntu) = ${{ steps.run_cycle.outcome }} (${{ github.run_id }})"
          from: naver-rank-checker <${{ secrets.GMAIL_USER }}>
          to: yoongu777@gmail.com
          body: |
            cron 실행 결과 (fallback/ubuntu-latest): ${{ steps.run_cycle.outcome }}
            ※ self-hosted runner 실패로 ubuntu fallback 실행됨. 사장님 PC 상태 확인 필요.

            Run URL: https://github.com/yoohojong/naver-rank-checker/actions/runs/${{ github.run_id }}

            상세 결과 + 셀 갱신 통계는 위 URL 또는 사장님 시트 확인.
            (issue #1 댓글에도 자동 알림 추가됨)

      # exit code 1 = HealthMonitor.code_change_suspected → 사장님 이메일 알림
