name: naver-rank-check
# 사장님 D-001: 공개→Private 저장소 + self-hosted runner (가정용 ISP IP, 차단 회피).
# 6시간 cron 4회/일. 사장님 시트 자동 갱신.
# T-M40 (2026-05-12 D-022): self-hosted 우선 + 실패 시 ubuntu-latest fallback 이중화.

on:
  schedule:
    # 2026-05-14 T-M40.2 빈도 증가: concurrency group = 중복 진행 자동 차단 (안전).
    # 1차 시도 (07/27분) 큐 지연 시 = 2차 시도 자동 진행 = 둘 중 하나는 정상 시간 진행.
    # 매일 KST 00:07/00:27, 06:07/06:27, 12:07/12:27, 18:07/18:27 (4시간 안 2번 시도)
    - cron: '7,27 15,21,3,9 * * *'
  workflow_dispatch:  # 사장님 수동 트리거 + 외부 cron-job.org API 호출용
    inputs:
      apply_type_preview:
        description: 'Write type-preview candidates to C column'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      allow_bulk_type_preview:
        description: 'Override type-preview bulk-change guard'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      apply_stale_formula_mode:
        description: 'Use input-key formula mode for K/L/M/O stale protection'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      recheck_stale_only:
        description: 'Only process stale-input rows currently shown as 재검사필요'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# critic 2026-05-08 Critical 2: cron overlap 방지.
concurrency:
  group: naver-rank-check
  cancel-in-progress: false

# 2026-05-15 알림 fix: GITHUB_TOKEN 권한 명시 — issue #1 자동 댓글 의무.
# 근거: 직전 run 25873780743 log = "Could not resolve to an issue or pull request with the number of 1"
# = 기본 GITHUB_TOKEN = issue write 권한 부족 = post_summary_to_issue.py silent fail
# fix = permissions block 명시 = 사장님 가시성 알림 흐름 복구.
permissions:
  issues: write
  contents: read

jobs:
  # T-M40.3 (2026-05-14): self-hosted runner 폐기 결정 — 사장님 명시.
  # 근거: 사장님 PC 24/7 online 부담 ↑ + 직전 cron success 다수 = ubuntu 환경 충분.
  # ubuntu-latest 단독 = 안정 + 사장님 의무 0.
  # fallback job 폐기 (= 단일 job = 단순화).
  run-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6.0.2
        continue-on-error: true
        with:
          # 2026-05-26: hosted Actions GITHUB_TOKEN checkout intermittently returned
          # "Your account is suspended" / 403 while owner PAT and public clone worked.
          # Prefer a repo secret PAT so sheet refresh can continue; fall back to
          # github.token if the secret is not configured.
          token: ${{ secrets.ACTIONS_PAT || github.token }}

      - name: Checkout fallback without token
        if: steps.checkout.outcome != 'success'
        shell: bash
        run: |
          set -euo pipefail
          echo "[CHECKOUT-FALLBACK] token checkout failed; trying public unauthenticated fetch"
          cd "$GITHUB_WORKSPACE"
          workspace="$(realpath "$GITHUB_WORKSPACE")"
          cwd="$(pwd -P)"
          if [[ "$cwd" != "$workspace" ]]; then
            echo "::error::Refusing to clean unexpected workspace cwd=$cwd expected=$workspace"
            exit 1
          fi
          find "$workspace" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          git init "$workspace"
          git -C "$workspace" config --local gc.auto 0
          git config --global --add safe.directory "$workspace"
          git -C "$workspace" remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git -C "$workspace" -c credential.helper= -c http.https://github.com/.extraheader= \
            fetch --no-tags --prune --depth=1 origin "+${GITHUB_SHA}:refs/remotes/origin/${GITHUB_REF_NAME}"
          git -C "$workspace" checkout --force "$GITHUB_SHA"

      - name: Verify checkout
        shell: bash
        run: |
          test -f requirements.txt
          test -f src/main.py

      - name: Setup Python 3.13
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.13'

      - name: Setup venv + install deps
        shell: bash
        run: |
          python -m venv .venv
          ./.venv/bin/python -m pip install --upgrade pip
          ./.venv/bin/python -m pip install -r requirements.txt

      - name: Run cron cycle
        id: run_cycle
        shell: bash
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          CAFE_WHITELIST_SLUGS: ${{ secrets.CAFE_WHITELIST_SLUGS }}  # T-M90 (2026-05-17): 사장님 운영 카페 slug 콤마 구분
          NAVER_SLOWDOWN_BASE_SEC: '5.0'
          NAVER_SLOWDOWN_MAX_SEC: '120'
          TYPE_PREVIEW_WRITE_CONFIRMED: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.apply_type_preview != 'false') }}
          TYPE_PREVIEW_WRITE_ALLOW_BULK: ${{ github.event_name == 'workflow_dispatch' && inputs.allow_bulk_type_preview == 'true' }}
          STALE_OUTPUT_FORMULA_MODE: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.apply_stale_formula_mode != 'false') }}
          RECHECK_STALE_ONLY: ${{ github.event_name == 'workflow_dispatch' && inputs.recheck_stale_only == 'true' }}
          PYTHONIOENCODING: 'utf-8'
          ARCHIVE_ENABLED: '1'  # 2026-07-02 사장님 "켜" — 상위노출 실적 일별 아카이빙 활성(비공개 시트 탭 '상위노출_이력')
        run: |
          # 자가복구(2026-06-21 사장님 요청): 1차 실패 시 90초 후 1회 자동 재시도.
          # = 일시적 네트워크/네이버 차단/구글 API 장애는 스스로 복구. 둘 다 실패하면 step 실패
          #   → 텔레그램 '실패' 알림(send_telegram_summary) → 사람(Claude) 검토 후 수정.
          # ⚠️ 코드 버그 '자동 수정'은 하지 않음(검증 없는 자동 코드변경 = 라이브 시트 손상 위험, 사고 이력).
          set +e
          ./.venv/bin/python -u -m src.main
          rc=$?
          # rc=2 = '코드/사이트 변경 의심'(bulk-guard hold 등) = 결정적 → 재시도해도 같은 결과.
          #   2026-06-30 fix: 이전엔 rc=2 도 전체 사이클(약 77분)을 통째 재실행해 매 run 2.5~4시간
          #   헛돌이 + 네이버/구글 API 중복 부하. 이제 rc=2 는 재시도 생략(빨강 알림은 유지).
          if [ $rc -ne 0 ] && [ $rc -ne 2 ]; then
            echo "[SELF-HEAL] 1차 실패(rc=$rc, 예기치 못한 크래시) — 90초 후 1회 자동 재시도"
            sleep 90
            ./.venv/bin/python -u -m src.main
            rc=$?
            [ $rc -eq 0 ] && echo "[SELF-HEAL] 재시도 성공" || echo "[SELF-HEAL] 재시도도 실패(rc=$rc)"
          elif [ $rc -eq 2 ]; then
            echo "[SELF-HEAL] rc=2 (코드/사이트 변경 의심 — 결정적) → 재시도 생략. 사람(Claude) 검토 필요."
          fi
          exit $rc

      # 폴더누락 근본해결(2026-06-26): team-project cafe-auto-collect 의 일1회 cron 이 schedule 실제 0회 발동
      #   → 카외 보관함 폴더 누락 누적(바디워시 70개 사건). 확실히 도는 이 cron(8회/일+외부 cron-job.org 백업)이
      #   매번 '카외 전수 폴더보장' 브리지(ensureAllFolders: 시트 스스로 스캔→링크없는 태깅키워드 폴더생성, 멱등)를
      #   호출 → 불안정한 cron 누락과 무관하게 폴더가 채워짐. 비차단(순위체크 본작업 영향 0).
      - name: Ensure 카외 보관함 folders (폴더누락 근본해결)
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          curl -sS -L --max-time 300 -X POST \
            "https://script.google.com/macros/s/AKfycbx-SDZ4upXCBARovOpwEqBy7-eCmuTo00iQjr9QRVu20I1KxKJpXFekcKMzwbpi3z2y/exec" \
            -H "Content-Type: application/json" \
            -d '{"mode":"ensureAllFolders","token":"cafe-deposit-2026"}' || true

      - name: Post summary to issue #1
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_PAT || github.token }}
          RUN_STATUS: ${{ steps.run_cycle.outcome }}
        run: |
          ./.venv/bin/python -u scripts/post_summary_to_issue.py

      # M10 (D-048): 즉시 보고 = 매 cron 성공/실패 + 운영 메타를 사장님 텔레그램으로.
      # 비차단(continue-on-error + || true). secret 미설정 시 [SKIP]. 메시지 text 는 인자로 안 넘김(로그 노출 차단).
      - name: Send Telegram notification (즉시 보고)
        if: always()
        continue-on-error: true
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_STATUS: ${{ steps.run_cycle.outcome }}
          PYTHONIOENCODING: 'utf-8'
        run: |
          ./.venv/bin/python -u scripts/send_telegram_summary.py || true

      # T-M86 (D-027 2026-05-17): 백업 artifact upload = 사장님 사고 시점 = 다운로드 + restore_backup.py 즉시 복원.
      # T-M90 (D-027 보강 2026-05-17) architect Opus m1 fix: retention 30 → 14일 + .gz 호환.
      # 근거: ~2.5MB × 4회/일 × 30일 = ~300MB → free tier 500MB 근접 위험. gzip 압축 + retention ↓ = 부담 ↓.
      # main.py T-M81 = 매 cron 시작 시 .harness/backups/{run_id}_{ts}.json.gz 저장 → artifact 업로드.
      - name: Upload sheet backup artifact
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: sheet-backup-${{ github.run_id }}
          path: |
            .harness/backups/*.json
            .harness/backups/*.json.gz
          retention-days: 14
          if-no-files-found: warn

      # D-032 (2026-05-19): row-level trace + invariant/post-write audit artifacts.
      # 사장님 특정 행 질문 시 = diagnostics artifact 안 JSONL grep 으로 원인 즉시 추적.
      - name: Upload diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: diagnostics-${{ github.run_id }}
          path: |
            .harness/traces/*.jsonl
            .harness/audits/*.jsonl
            .harness/type-previews/*.jsonl
            .harness/type-previews/*.md
            .harness/stale-previews/*.jsonl
            .harness/stale-previews/*.md
          retention-days: 14
          if-no-files-found: warn

      # 2026-05-13: 이메일 step 제거. root cause = GMAIL_USER/GMAIL_APP_PASSWORD secrets 미등록.
      # fix = issue #1 댓글 알림 (Step 6) 만 의존. 사장님 GitHub 계정 알림 설정 = 자동 이메일.

      # 2026-05-14 T-M40.3: fallback job 폐기 (self-hosted 의존 제거 + 단일 ubuntu-latest 안정).
