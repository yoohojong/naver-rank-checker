name: naver-rank-check
# 사장님 D-001: 공개→Private 저장소 + self-hosted runner (가정용 ISP IP, 차단 회피).
# 6시간 cron 4회/일. 사장님 시트 자동 갱신.
# 2026-05-12 T-M15: 사장님 PC self-hosted runner offline 시 fallback = ubuntu-latest 임시 변경.
# curl_cffi (T-M9.1) 적용으로 Azure IP 차단 회피 시도. 사장님 PC 복구 시 self-hosted 복원 의무.

on:
  schedule:
    # 매일 KST 00:00, 06:00, 12:00, 18:00 (UTC 기준 15/21/03/09)
    - cron: '0 15,21,3,9 * * *'
  workflow_dispatch:  # 사장님 수동 트리거 (Actions 탭 "Run workflow")

# critic 2026-05-08 Critical 2: cron overlap 방지.
concurrency:
  group: naver-rank-check
  cancel-in-progress: false

jobs:
  run-cron:
    runs-on: ubuntu-latest  # T-M15 임시 (self-hosted offline 시 fallback). curl_cffi 차단 회피 시도.
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Setup venv + install deps
        shell: bash
        run: |
          python -m venv .venv
          ./.venv/bin/python -m pip install --upgrade pip
          ./.venv/bin/python -m pip install -r requirements.txt

      - name: Run cron cycle
        id: run_cycle
        shell: bash
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          NAVER_SLOWDOWN_BASE_SEC: '5.0'
          NAVER_SLOWDOWN_MAX_SEC: '120'
          PYTHONIOENCODING: 'utf-8'
        run: |
          ./.venv/bin/python -u -m src.main

      # 2026-05-11: 사장님 매 cron 풍부한 이메일 알림 (issue #1 mention comment).
      - name: Post summary to issue #1
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_STATUS: ${{ steps.run_cycle.outcome }}
        run: |
          ./.venv/bin/python -u scripts/post_summary_to_issue.py

      # 2026-05-12 T-M17: 사장님 명시 — 매 cron 후 yoongu777@gmail.com 직접 이메일 알림
      - name: Send email to 사장님 (yoongu777@gmail.com)
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "[naver-rank-checker] cron 결과 = ${{ steps.run_cycle.outcome }} (${{ github.run_id }})"
          from: naver-rank-checker <${{ secrets.GMAIL_USER }}>
          to: yoongu777@gmail.com
          body: |
            cron 실행 결과: ${{ steps.run_cycle.outcome }}

            Run URL: https://github.com/yoohojong/naver-rank-checker/actions/runs/${{ github.run_id }}

            상세 결과 + 셀 갱신 통계는 위 URL 또는 사장님 시트 확인.
            (issue #1 댓글에도 자동 알림 추가됨)

      # exit code 1 = HealthMonitor.code_change_suspected → 사장님 이메일 알림
