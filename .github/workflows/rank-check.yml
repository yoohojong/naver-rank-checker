name: naver-rank-check
# 사장님 D-001: 공개→Private 저장소 + self-hosted runner (가정용 ISP IP, 차단 회피).
# 6시간 cron 4회/일. 사장님 시트 자동 갱신.
# 2026-05-11: ubuntu-latest → self-hosted (Azure IP 차단) + setup-python action 제거 (사장님 PC 자체 Python 3.13).

on:
  schedule:
    # 매일 KST 00:00, 06:00, 12:00, 18:00 (UTC 기준 15/21/03/09)
    - cron: '0 15,21,3,9 * * *'
  workflow_dispatch:  # 사장님 수동 트리거 (Actions 탭 "Run workflow")

# critic 2026-05-08 Critical 2: cron overlap 방지.
concurrency:
  group: naver-rank-check
  cancel-in-progress: false

jobs:
  run-cron:
    runs-on: self-hosted  # 사장님 PC (Windows 11 Home, 가정용 ISP IP).
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 2026-05-11: setup-python action 제거. 사장님 PC 의 Python 3.13 직접 사용.
      # 매 run 마다 venv 신규 생성 = 환경 격리 + 사장님 system Python 안 건드림.
      - name: Setup venv + install deps
        shell: powershell
        run: |
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          python -m venv .venv
          .\.venv\Scripts\python -m pip install --upgrade pip
          .\.venv\Scripts\python -m pip install -r requirements.txt

      - name: Run cron cycle
        id: run_cycle
        shell: powershell
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          NAVER_SLOWDOWN_BASE_SEC: '5.0'
          NAVER_SLOWDOWN_MAX_SEC: '120'
          PYTHONIOENCODING: 'utf-8'
        run: |
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          .\.venv\Scripts\python -u -m src.main

      # 2026-05-11: 사장님 매 cron 풍부한 이메일 알림 (issue #1 mention comment).
      - name: Post summary to issue #1
        if: always()
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_STATUS: ${{ steps.run_cycle.outcome }}
        run: |
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          .\.venv\Scripts\python -u scripts/post_summary_to_issue.py

      # exit code 1 = HealthMonitor.code_change_suspected → 사장님 이메일 알림
