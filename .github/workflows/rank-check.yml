name: naver-rank-check
# мВђмЮ•лЛШ D-001: к≥µк∞ЬвЖТPrivate м†АмЮ•мЖМ + self-hosted runner (к∞Ам†ХмЪ© ISP IP, м∞®лЛ® нЪМнФЉ).
# 6мЛЬк∞Д cron 4нЪМ/мЭЉ. мВђмЮ•лЛШ мЛЬнКЄ мЮРлПЩ к∞±мЛ†.
# T-M40 (2026-05-12 D-022): self-hosted мЪ∞мД† + мЛ§нМ® мЛЬ ubuntu-latest fallback мЭім§СнЩФ.

on:
  schedule:
    # 2026-05-14 T-M40.2 лєИлПД м¶Эк∞А: concurrency group = м§Сл≥µ мІДнЦЙ мЮРлПЩ м∞®лЛ® (мХИм†Д).
    # 1м∞® мЛЬлПД (07/27лґД) нБР мІАмЧ∞ мЛЬ = 2м∞® мЛЬлПД мЮРлПЩ мІДнЦЙ = лСШ м§С нХШлВШлКФ м†ХмГБ мЛЬк∞Д мІДнЦЙ.
    # лІ§мЭЉ KST 00:07/00:27, 06:07/06:27, 12:07/12:27, 18:07/18:27 (4мЛЬк∞Д мХИ 2л≤И мЛЬлПД)
    - cron: '7,27 15,21,3,9 * * *'
  workflow_dispatch:  # мВђмЮ•лЛШ мИШлПЩ нКЄл¶ђк±∞ + мЩЄлґА cron-job.org API нШЄмґЬмЪ©
    inputs:
      apply_type_preview:
        description: 'Write type-preview candidates to C column'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      allow_bulk_type_preview:
        description: 'Override type-preview bulk-change guard'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      apply_stale_formula_mode:
        description: 'Use input-key formula mode for K/L/M/O stale protection'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      recheck_stale_only:
        description: 'Only process stale-input rows currently shown as мЮђк≤АмВђнХДмЪФ'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# critic 2026-05-08 Critical 2: cron overlap л∞©мІА.
concurrency:
  group: naver-rank-check
  cancel-in-progress: false

# 2026-05-15 мХМл¶Љ fix: GITHUB_TOKEN кґМнХЬ л™ЕмЛЬ вАФ issue #1 мЮРлПЩ лМУкЄА мЭШлђі.
# кЈЉк±∞: мІБм†Д run 25873780743 log = "Could not resolve to an issue or pull request with the number of 1"
# = кЄ∞л≥Є GITHUB_TOKEN = issue write кґМнХЬ лґАм°± = post_summary_to_issue.py silent fail
# fix = permissions block л™ЕмЛЬ = мВђмЮ•лЛШ к∞АмЛЬмД± мХМл¶Љ нЭРл¶Д л≥µкµђ.
permissions:
  issues: write
  contents: read

jobs:
  # T-M40.3 (2026-05-14): self-hosted runner нПРкЄ∞ к≤∞м†Х вАФ мВђмЮ•лЛШ л™ЕмЛЬ.
  # кЈЉк±∞: мВђмЮ•лЛШ PC 24/7 online лґАлЛі вЖС + мІБм†Д cron success лЛ§мИШ = ubuntu нЩШк≤љ мґ©лґД.
  # ubuntu-latest лЛ®лПЕ = мХИм†Х + мВђмЮ•лЛШ мЭШлђі 0.
  # fallback job нПРкЄ∞ (= лЛ®мЭЉ job = лЛ®мИЬнЩФ).
  run-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6.0.2
        continue-on-error: true
        with:
          # 2026-05-26: hosted Actions GITHUB_TOKEN checkout intermittently returned
          # "Your account is suspended" / 403 while owner PAT and public clone worked.
          # Prefer a repo secret PAT so sheet refresh can continue; fall back to
          # github.token if the secret is not configured.
          token: ${{ secrets.ACTIONS_PAT || github.token }}

      - name: Checkout fallback without token
        if: steps.checkout.outcome != 'success'
        shell: bash
        run: |
          set -euo pipefail
          echo "[CHECKOUT-FALLBACK] token checkout failed; trying public unauthenticated fetch"
          cd "$GITHUB_WORKSPACE"
          workspace="$(realpath "$GITHUB_WORKSPACE")"
          cwd="$(pwd -P)"
          if [[ "$cwd" != "$workspace" ]]; then
            echo "::error::Refusing to clean unexpected workspace cwd=$cwd expected=$workspace"
            exit 1
          fi
          find "$workspace" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          git init "$workspace"
          git -C "$workspace" config --local gc.auto 0
          git config --global --add safe.directory "$workspace"
          git -C "$workspace" remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git -C "$workspace" -c credential.helper= -c http.https://github.com/.extraheader= \
            fetch --no-tags --prune --depth=1 origin "+${GITHUB_SHA}:refs/remotes/origin/${GITHUB_REF_NAME}"
          git -C "$workspace" checkout --force "$GITHUB_SHA"

      - name: Verify checkout
        shell: bash
        run: |
          test -f requirements.txt
          test -f src/main.py

      - name: Setup Python 3.13
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.13'

      - name: Setup venv + install deps
        shell: bash
        run: |
          python -m venv .venv
          ./.venv/bin/python -m pip install --upgrade pip
          ./.venv/bin/python -m pip install -r requirements.txt

      - name: Run cron cycle
        id: run_cycle
        shell: bash
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          CAFE_WHITELIST_SLUGS: ${{ secrets.CAFE_WHITELIST_SLUGS }}  # T-M90 (2026-05-17): мВђмЮ•лЛШ мЪімШБ мєінОШ slug мљ§лІИ кµђлґД
          NAVER_SLOWDOWN_BASE_SEC: '5.0'
          NAVER_SLOWDOWN_MAX_SEC: '120'
          TYPE_PREVIEW_WRITE_CONFIRMED: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.apply_type_preview != 'false') }}
          TYPE_PREVIEW_WRITE_ALLOW_BULK: ${{ github.event_name == 'workflow_dispatch' && inputs.allow_bulk_type_preview == 'true' }}
          STALE_OUTPUT_FORMULA_MODE: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.apply_stale_formula_mode != 'false') }}
          RECHECK_STALE_ONLY: ${{ github.event_name == 'workflow_dispatch' && inputs.recheck_stale_only == 'true' }}
          PYTHONIOENCODING: 'utf-8'
        run: |
          ./.venv/bin/python -u -m src.main

      - name: Post summary to issue #1
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_PAT || github.token }}
          RUN_STATUS: ${{ steps.run_cycle.outcome }}
        run: |
          ./.venv/bin/python -u scripts/post_summary_to_issue.py

      # T-M86 (D-027 2026-05-17): л∞±мЧЕ artifact upload = мВђмЮ•лЛШ мВђк≥† мЛЬм†Р = лЛ§мЪіл°ЬлУЬ + restore_backup.py м¶ЙмЛЬ л≥µмЫР.
      # T-M90 (D-027 л≥ік∞Х 2026-05-17) architect Opus m1 fix: retention 30 вЖТ 14мЭЉ + .gz нШЄнЩШ.
      # кЈЉк±∞: ~2.5MB √Ч 4нЪМ/мЭЉ √Ч 30мЭЉ = ~300MB вЖТ free tier 500MB кЈЉм†С мЬДнЧШ. gzip мХХмґХ + retention вЖУ = лґАлЛі вЖУ.
      # main.py T-M81 = лІ§ cron мЛЬмЮС мЛЬ .harness/backups/{run_id}_{ts}.json.gz м†АмЮ• вЖТ artifact мЧЕл°ЬлУЬ.
      - name: Upload sheet backup artifact
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: sheet-backup-${{ github.run_id }}
          path: |
            .harness/backups/*.json
            .harness/backups/*.json.gz
          retention-days: 14
          if-no-files-found: warn

      # D-032 (2026-05-19): row-level trace + invariant/post-write audit artifacts.
      # мВђмЮ•лЛШ нКєм†Х нЦЙ мІИлђЄ мЛЬ = diagnostics artifact мХИ JSONL grep мЬЉл°Ь мЫРмЭЄ м¶ЙмЛЬ мґФм†Б.
      - name: Upload diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: diagnostics-${{ github.run_id }}
          path: |
            .harness/traces/*.jsonl
            .harness/audits/*.jsonl
            .harness/type-previews/*.jsonl
            .harness/type-previews/*.md
            .harness/stale-previews/*.jsonl
            .harness/stale-previews/*.md
          retention-days: 14
          if-no-files-found: warn

      # 2026-05-13: мЭіл©ФмЭЉ step м†Ьк±∞. root cause = GMAIL_USER/GMAIL_APP_PASSWORD secrets лѓЄлУ±л°Э.
      # fix = issue #1 лМУкЄА мХМл¶Љ (Step 6) лІМ мЭШм°і. мВђмЮ•лЛШ GitHub к≥Дм†Х мХМл¶Љ мД§м†Х = мЮРлПЩ мЭіл©ФмЭЉ.

      # 2026-05-14 T-M40.3: fallback job нПРкЄ∞ (self-hosted мЭШм°і м†Ьк±∞ + лЛ®мЭЉ ubuntu-latest мХИм†Х).
