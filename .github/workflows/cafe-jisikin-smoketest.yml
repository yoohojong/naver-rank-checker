name: cafe-jisikin-smoketest
# 지식인 수집 '키 작동' 확인용 (수동 전용). 고정/입력 키워드로 fetch_jisikin 을 직접 1회 호출해
# 네이버 Open API 키가 실제로 작동하는지 + 실제 지식인 Q&A 제목이 들어오는지 즉시 확인.
# (cafe-material-collect 는 시트에 '3 증상' 태깅된 키워드가 있어야 수집 → 이건 그것과 무관하게 키만 검증.)
#
# [feat/review-lowstar-pw 한정] run 27928928282(1h 타임아웃) 원인 규명용 review_timing 잡 추가.
#   review_timing=true 로 dispatch → 저점리뷰(Playwright)를 소수 키워드로 돌려 키워드/완료/예외마다
#   타임스탬프 로그 출력. (a)키워드량 느림 vs (b)네이버 GHA IP 차단 판별. 라이브 시트 미접근.
on:
  workflow_dispatch:
    inputs:
      keyword:
        description: '테스트할 증상 키워드(지식인 잡)'
        required: false
        default: '두피 가려움'
      review_timing:
        description: '저점리뷰 시간측정 진단 실행(true/false)'
        required: false
        default: 'false'
      review_keywords:
        description: '저점리뷰 키워드(쉼표구분, 대표 타사 브랜드)'
        required: false
        default: '니조랄,헤드앤숄더,도브'
      review_max:
        description: '저점리뷰 키워드당 목표 건수'
        required: false
        default: '5'
      count_keywords:
        description: '라이브 시트 카외 탭 단계별 키워드 개수만 카운트(읽기전용, true/false)'
        required: false
        default: 'false'
      matrix_probe:
        description: 'matrix 병렬 실증(4 job 동시 + job별 egress IP + 실측, 시트 미접근). true/false'
        required: false
        default: 'false'
      yield_probe:
        description: '수율 진단 — 키워드별 검색이 주는 상품URL 종류(brand/smartstore-main/other) 계측. true/false'
        required: false
        default: 'false'
      yield_kws:
        description: '수율 진단 키워드(콤마). 비우면 대표 샘플(브랜드제품/카테고리/대안 혼합).'
        required: false
        default: ''

concurrency:
  group: cafe-jisikin-smoketest
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # matrix 병렬 실증 — 4개 job 을 동시에 띄워 (a)정말 병렬로 도는가 (b)job 마다 egress IP 가 다른가
  #   (c)실측 시간 을 시트 접근 없이 증명. cafe-review-lowstar-matrix.yml 본운영의 축소 사전검증.
  review_matrix_probe:
    if: ${{ inputs.matrix_probe == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.ACTIONS_PAT || github.token }}
      - name: 러너 egress IP (shard 별)
        shell: bash
        run: |
          echo "PROBE shard=${{ matrix.shard }} egress_ip=$(curl -s --max-time 10 https://api.ipify.org || echo unknown)"
      - name: Setup Python 3.13
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.13'
      - name: Setup venv + install deps
        shell: bash
        run: |
          python -m venv .venv
          ./.venv/bin/python -m pip install --upgrade pip
          ./.venv/bin/python -m pip install -r requirements.txt
      - name: Install Playwright chromium
        shell: bash
        run: |
          ./.venv/bin/python -m playwright install --with-deps chromium
      - name: 저점리뷰 실측 (shard별 1키워드, 시트 미접근)
        shell: bash
        env:
          SHARD: ${{ matrix.shard }}
          PYTHONIOENCODING: 'utf-8'
        run: |
          ./.venv/bin/python -u - <<'PY'
          import os, time
          from src.review_lowstar import fetch_low_star_reviews
          # shard 마다 다른 키워드(병렬로 서로 다른 일을 함을 확인).
          kws = ["헤드앤숄더", "쿤달", "케라시스", "려"]
          s = int(os.environ.get("SHARD") or "0")
          kw = kws[s % len(kws)]
          t = time.time()
          rows = fetch_low_star_reviews(kw, max_reviews=100)
          print(f"PROBE shard={s} kw='{kw}' 결과={len(rows)}건 / {time.time()-t:.0f}s", flush=True)
          PY

  # 수율 진단 — 키워드별로 통합검색이 주는 상품URL 종류를 계측.
  #   brand.naver.com(코드가 씀) vs smartstore/main(로그인월=코드 스킵) vs smartstore/기타(코드가 씀) vs 0.
  #   '브랜드제품인데 0건'의 원인이 (a)검색이 상품을 안 줌 (b)smartstore/main 만 줘서 스킵 인지 판별.
  yield_probe:
    if: ${{ inputs.yield_probe == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.ACTIONS_PAT || github.token }}
      - name: Setup Python 3.13
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.13'
      - name: Setup venv + install deps
        shell: bash
        run: |
          python -m venv .venv
          ./.venv/bin/python -m pip install --upgrade pip
          ./.venv/bin/python -m pip install -r requirements.txt
      - name: Install Playwright chromium
        shell: bash
        run: |
          ./.venv/bin/python -m playwright install --with-deps chromium
      - name: 키워드별 검색 상품URL 종류 계측
        shell: bash
        env:
          YIELD_KWS: ${{ inputs.yield_kws }}
          PYTHONIOENCODING: 'utf-8'
        run: |
          ./.venv/bin/python -u - <<'PY'
          import os, re, time
          from playwright.sync_api import sync_playwright
          from src.review_lowstar import parse_product_urls, _UA, fetch_low_star_reviews

          kws = [k.strip() for k in (os.environ.get("YIELD_KWS") or "").split(",") if k.strip()]
          if not kws:
              kws = [
                  "헤드앤숄더", "케라시스",                 # 후기 나온 대형 브랜드(대조군)
                  "니조랄연고", "니조랄2%", "헤드앤숄더딥클린",  # 5-브랜드제품(특정 제품/규격)
                  "도브센서티브뷰티바", "아모스녹차실감샴푸",   # 5-브랜드제품
                  "순한샴푸", "아토피샴푸",                  # 5-카테고리(일반어)
                  "비듬제거", "두피케어",                    # 4-대안(상품 아님)
              ]
          BRAND = re.compile(r"https?://brand\.naver\.com/[A-Za-z0-9_\-]+/products/\d+")
          SSMAIN = re.compile(r"https?://smartstore\.naver\.com/main/products/\d+")
          SSOTHER = re.compile(r"https?://smartstore\.naver\.com/(?!main/)[A-Za-z0-9_\-]+/products/\d+")

          with sync_playwright() as p:
              br = p.chromium.launch(headless=True, args=["--disable-blink-features=AutomationControlled"])
              ctx = br.new_context(user_agent=_UA, locale="ko-KR", viewport={"width":1366,"height":2200})
              pg = ctx.new_page()
              print("kw | brand | ss/main(skip) | ss/other | code_usable | 실수집후기", flush=True)
              for kw in kws:
                  try:
                      pg.goto("https://search.naver.com/search.naver?query="+kw.replace(" ","+"),
                              wait_until="domcontentloaded", timeout=45000)
                      time.sleep(3)
                      for _ in range(3):
                          pg.mouse.wheel(0, 2200); time.sleep(0.9)
                      anchors = pg.eval_on_selector_all("a", "els => els.map(e=>e.href).filter(Boolean)")
                      blob = "\n".join(anchors) + "\n" + pg.content()
                      b = len(set(BRAND.findall(blob)))
                      m = len(set(SSMAIN.findall(blob)))
                      o = len(set(SSOTHER.findall(blob)))
                      usable = len(parse_product_urls(blob))
                      # 실제 코드 경로로도 몇 건 나오는지(짧게 20건 목표)
                      n = len(fetch_low_star_reviews(kw, max_reviews=20))
                      print(f"{kw} | {b} | {m} | {o} | {usable} | {n}", flush=True)
                  except Exception as e:
                      print(f"{kw} | ERROR {type(e).__name__}: {e}", flush=True)
                  time.sleep(2)
              br.close()
          PY

  smoke:
    if: ${{ inputs.review_timing != 'true' && inputs.count_keywords != 'true' && inputs.matrix_probe != 'true' && inputs.yield_probe != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.ACTIONS_PAT || github.token }}

      - name: Setup Python 3.13
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.13'

      - name: Setup venv + install deps
        shell: bash
        run: |
          python -m venv .venv
          ./.venv/bin/python -m pip install --upgrade pip
          ./.venv/bin/python -m pip install -r requirements.txt

      - name: 지식인 키 작동 확인
        shell: bash
        env:
          NAVER_OPENAPI_CLIENT_ID: ${{ secrets.NAVER_OPENAPI_CLIENT_ID }}
          NAVER_OPENAPI_CLIENT_SECRET: ${{ secrets.NAVER_OPENAPI_CLIENT_SECRET }}
          KW: ${{ inputs.keyword }}
          PYTHONIOENCODING: 'utf-8'
        run: |
          ./.venv/bin/python - <<'PY'
          import os
          from src.jisikin_collect import fetch_jisikin
          kw = os.environ.get("KW") or "두피 가려움"
          cid = os.environ.get("NAVER_OPENAPI_CLIENT_ID", "")
          csec = os.environ.get("NAVER_OPENAPI_CLIENT_SECRET", "")
          if not (cid and csec):
              print("❌ NAVER 키 미설정 — GitHub Secrets(NAVER_OPENAPI_CLIENT_ID/SECRET) 확인 필요")
              raise SystemExit(1)
          r = fetch_jisikin(kw, client_id=cid, client_secret=csec)
          print(f"✅ 키워드 '{kw}' → 지식인 {len(r)}건 수집 성공 (= 네이버 키 작동 확인)")
          for i, x in enumerate(r[:8], 1):
              print(f"  {i}. {x['title']}")
          PY

  review_timing:
    if: ${{ inputs.review_timing == 'true' }}
    runs-on: ubuntu-latest
    # 진단용 — 과속 차단 시 무한대기 방지. material(60)보다 짧게.
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.ACTIONS_PAT || github.token }}

      - name: Setup Python 3.13
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.13'

      - name: Setup venv + install deps
        shell: bash
        run: |
          python -m venv .venv
          ./.venv/bin/python -m pip install --upgrade pip
          ./.venv/bin/python -m pip install -r requirements.txt

      - name: Install Playwright chromium
        shell: bash
        run: |
          ./.venv/bin/python -m playwright install --with-deps chromium

      - name: 저점리뷰 실동작 + 시간측정
        shell: bash
        env:
          KEYWORDS: ${{ inputs.review_keywords }}
          MAXREV: ${{ inputs.review_max }}
          PYTHONIOENCODING: 'utf-8'
        run: |
          ./.venv/bin/python -u - <<'PY'
          import os, time, traceback
          from src.review_lowstar import fetch_low_star_reviews

          kws = [k.strip() for k in (os.environ.get("KEYWORDS") or "").split(",") if k.strip()]
          if not kws:
              kws = ["니조랄", "헤드앤숄더", "도브"]
          try:
              maxrev = int(os.environ.get("MAXREV") or "5")
          except ValueError:
              maxrev = 5

          print(f"=== 저점리뷰 진단 시작: 키워드 {len(kws)}개 {kws}, 키워드당 목표 {maxrev}건 ===", flush=True)
          t0 = time.time()
          for i, kw in enumerate(kws, 1):
              ts = time.time()
              print(f"[{i}/{len(kws)}] '{kw}' 시작 (경과 {ts - t0:.0f}s)", flush=True)
              try:
                  rows = fetch_low_star_reviews(kw, max_reviews=maxrev)
                  dt = time.time() - ts
                  print(f"[{i}/{len(kws)}] '{kw}' 완료: {len(rows)}건 / {dt:.0f}s", flush=True)
                  for j, r in enumerate(rows[:3], 1):
                      c = (r.get("content") or "")[:60].replace("\n", " ")
                      print(f"      {j}. ({r.get('score')}점) {c}", flush=True)
              except Exception as e:
                  dt = time.time() - ts
                  print(f"[{i}/{len(kws)}] '{kw}' 예외: {type(e).__name__}: {e} ({dt:.0f}s)", flush=True)
                  traceback.print_exc()
          print(f"=== 진단 종료: 총 {time.time() - t0:.0f}s ===", flush=True)
          PY

  count_keywords:
    if: ${{ inputs.count_keywords == 'true' }}
    runs-on: ubuntu-latest
    # 읽기전용 — 시트 read 가 행오버하면 여기서 멈춤(=1h 행오버가 시트read 였는지 판별).
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.ACTIONS_PAT || github.token }}

      - name: Setup Python 3.13
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.13'

      - name: Setup venv + install deps
        shell: bash
        run: |
          python -m venv .venv
          ./.venv/bin/python -m pip install --upgrade pip
          ./.venv/bin/python -m pip install -r requirements.txt

      - name: 라이브 시트 단계별 키워드 카운트(읽기전용)
        shell: bash
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          PYTHONIOENCODING: 'utf-8'
        run: |
          ./.venv/bin/python -u - <<'PY'
          import time
          from src.config import SERVICE_ACCOUNT_JSON, SPREADSHEET_ID
          from src.integration_runner import _stage_value, _stage_digit, COL_KEYWORD
          from src.sheets import SheetsClient

          print("=== 시트 read 시작 ===", flush=True)
          t0 = time.time()
          client = SheetsClient(spreadsheet_id=SPREADSHEET_ID, service_account_json=SERVICE_ACCOUNT_JSON)
          data = client.load_all_data_tabs(tab_filter=lambda n: "카외" in n)
          print(f"=== 시트 read 완료: 카외 탭 {len(data)}개 / {time.time()-t0:.1f}s ===", flush=True)

          from collections import Counter
          per_stage = Counter()
          review_keywords = []
          for tab, rows in data.items():
              tab_cnt = Counter()
              for row in rows or []:
                  kw = (row.get(COL_KEYWORD) or "").strip()
                  d = _stage_digit(_stage_value(row))
                  if not kw or not d:
                      continue
                  per_stage[d] += 1
                  tab_cnt[d] += 1
                  if d in ("4", "5"):
                      review_keywords.append(kw)
              print(f"  탭 '{tab}': 행 {len(rows or [])} / 단계분포 {dict(tab_cnt)}", flush=True)

          n45 = per_stage["4"] + per_stage["5"]
          target_kw = set(review_keywords)
          print(f"=== 단계별 키워드(전체): {dict(per_stage)} ===", flush=True)
          print(f"=== 저점리뷰(Playwright) 대상 4/5단계 키워드 = {n45}개(고유 {len(target_kw)}) ===", flush=True)

          # ★ 완료도 확인: 수집결과_리뷰 탭에 실제 적재된(저장된) 고유 키워드 수 vs 대상.
          from src.integration_runner import STAGING_TAB_REVIEW
          try:
              recs = client.read_tab_records(STAGING_TAB_REVIEW)
          except Exception as e:
              recs = []
              print(f"  (수집결과_리뷰 read 실패: {type(e).__name__})", flush=True)
          done_all = {(r.get("키워드") or "").strip() for r in (recs or []) if (r.get("키워드") or "").strip()}
          # 0건 마커도 '처리완료'로 침(다음 run 재시도 방지용 마커). 실제 후기 있는 키워드만 따로 카운트.
          with_reviews = {(r.get("키워드") or "").strip() for r in (recs or [])
                          if (r.get("키워드") or "").strip() and (r.get("제목") or "").strip() not in ("", "0건")}
          done_in_target = target_kw & done_all
          remaining = target_kw - done_all
          print(f"=== 저장 현황(수집결과_리뷰): 적재 행 {len(recs or [])} ===", flush=True)
          print(f"=== 처리완료 키워드(0건 마커 포함) = {len(done_in_target)}/{len(target_kw)} / 남은 {len(remaining)}개 ===", flush=True)
          print(f"=== 실제 후기 있는 키워드 = {len(with_reviews & target_kw)}개 ===", flush=True)
          if remaining:
              print("    아직 안 한 키워드(최대 30개):", flush=True)
              for k in list(remaining)[:30]:
                  print(f"      - {k}", flush=True)
          PY
