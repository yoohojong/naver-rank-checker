name: cafe-dashboard

# 카페외부 일·주·월 대시보드 텔레그램 발송 (2026-07-13 신규).
#   - 일간·주간 = 인라인 이미지(PNG, sendPhoto) — 채팅에 바로 뜸.
#   - 월간 = HTML 파일(sendDocument).
# 데이터 = rank-check 의 sheet-backup artifact 재가공(GH_TOKEN 으로 다운로드, 시트 키 불필요).
# 기존 rank-check / telegram-report / weekly-digest 워크플로와 완전 별개(무손상).

on:
  workflow_dispatch:
    inputs:
      report:
        description: '리포트 종류'
        type: choice
        options:
          - daily
          - weekly
          - monthly
        default: daily
  schedule:
    - cron: '0 12 * * *'   # 일간: 매일 KST 21:00 (= UTC 12:00)
    - cron: '0 0 * * 1'    # 주간: 매주 월요일 KST 09:00 (= UTC 월 00:00)
    - cron: '0 0 1 * *'    # 월간: 매월 1일 KST 09:00 (= UTC 1일 00:00)

permissions:
  actions: read     # rank-check 의 sheet-backup artifact 다운로드용
  contents: read

concurrency:
  group: cafe-dashboard-${{ github.ref }}
  cancel-in-progress: false

jobs:
  dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Install chromium
        run: python -m playwright install --with-deps chromium

      - name: Decide report type
        id: which
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_REPORT: ${{ github.event.inputs.report }}
          SCHED_CRON: ${{ github.event.schedule }}
        run: |
          # workflow_dispatch = 입력값(choice) / schedule = cron 별 분기. 값은 env 로만 참조(인젝션 방지).
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            REPORT="${INPUT_REPORT:-daily}"
          else
            case "$SCHED_CRON" in
              "0 0 * * 1") REPORT="weekly" ;;
              "0 0 1 * *") REPORT="monthly" ;;
              *)           REPORT="daily" ;;
            esac
          fi
          echo "report=$REPORT" >> "$GITHUB_OUTPUT"
          echo "선택된 리포트: $REPORT"

      - name: Send dashboard
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.ACTIONS_PAT || github.token }}   # 타 워크플로 artifact 다운로드용
          GH_REPO: ${{ github.repository }}
          PYTHONIOENCODING: 'utf-8'
          REPORT: ${{ steps.which.outputs.report }}
        run: |
          # 화이트리스트 case 로만 스크립트 선택(셸 인젝션 차단).
          case "$REPORT" in
            daily|weekly|monthly) python -u "scripts/send_${REPORT}_dashboard.py" ;;
            *) echo "알 수 없는 리포트: $REPORT"; exit 1 ;;
          esac
