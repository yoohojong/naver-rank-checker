name: weekly-digest

# M11 (2026-06-23): 카페외부 주간 총괄 다이제스트 (총괄자용). 일일 telegram-report 와 별개.
# 데이터는 rank-check 의 sheet-backup artifact 재가공(시트 read·서비스계정 키 불필요).
#
# ✅ 자동발송 ON (사장님 "켜" 2026-06-23): 매주 월요일 07:00 KST 자동 발송.
#   - 수동 실행(workflow_dispatch)은 기본 dry-run(로그만), 'send=true' 입력 시 텔레그램 발송.
#   - 끄려면 아래 schedule 두 줄 다시 주석 처리.

on:
  schedule:
    - cron: '0 22 * * 0'   # 월요일 07:00 KST (일요일 22:00 UTC)
  workflow_dispatch:
    inputs:
      send:
        description: "'true' 면 텔레그램 발송, 비우면 dry-run(로그만)"
        default: ''

permissions:
  actions: read     # rank-check 의 sheet-backup artifact 다운로드용
  contents: read

concurrency:
  group: weekly-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.13'

      - name: Build / send weekly digest
        continue-on-error: true
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ github.token }}  # permissions actions:read 로 타 워크플로 artifact 접근(D-051 정합)
          GH_REPO: ${{ github.repository }}
          # ⚠️ 셸 인젝션 차단: 이벤트 입력값은 env 경유로만 참조
          INPUT_SEND: ${{ github.event.inputs.send }}
          PYTHONIOENCODING: 'utf-8'
        run: |
          # 기본 dry-run. 입력 send=true 일 때만 실제 발송('send' 인자). 값은 env 로만 참조(인젝션 방지).
          ARG=""
          if [ "$INPUT_SEND" = "true" ]; then ARG="send"; fi
          # 의존성 없음(stdlib + transitions). gh 는 ubuntu-latest 기본 제공. secret 없으면 [SKIP].
          python -u scripts/send_weekly_digest.py "$ARG" || true
