name: weekly-digest

# M11 (2026-06-23): 카페외부 주간 총괄 다이제스트 (총괄자용). 일일 telegram-report 와 별개.
# 데이터는 rank-check 의 sheet-backup artifact 재가공(시트 read·서비스계정 키 불필요).
#
# ⏸ 자동발송 OFF (2026-06-23): '노출만' 버전 → 매출 포함 통합 보고(team project margin-auto/
#   weekly_cafe_report.py, 마진봇, 매주 월 7시 schtask CafeWeeklyReport)로 대체. 중복 방지 위해 끔.
#   되살리려면 아래 schedule 주석 해제. 수동 점검은 workflow_dispatch 로 여전히 가능.

on:
  # schedule:
  #   - cron: '0 22 * * 0'   # 월요일 07:00 KST — 통합보고로 대체하며 중단(2026-06-23)
  workflow_dispatch:
    inputs:
      send:
        description: "'true' 면 텔레그램 발송, 비우면 dry-run(로그만)"
        default: ''

permissions:
  actions: read     # rank-check 의 sheet-backup artifact 다운로드용
  contents: read
  issues: write

concurrency:
  group: weekly-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.13'

      - name: Build / send weekly digest
        continue-on-error: true
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ github.token }}  # permissions actions:read 로 타 워크플로 artifact 접근(D-051 정합)
          GH_REPO: ${{ github.repository }}
          # ⚠️ 셸 인젝션 차단: 이벤트 입력값은 env 경유로만 참조
          INPUT_SEND: ${{ github.event.inputs.send }}
          PYTHONIOENCODING: 'utf-8'
        run: |
          # 기본 dry-run. 입력 send=true 일 때만 실제 발송('send' 인자). 값은 env 로만 참조(인젝션 방지).
          ARG=""
          if [ "$INPUT_SEND" = "true" ]; then ARG="send"; fi
          # 의존성 없음(stdlib + transitions). gh 는 ubuntu-latest 기본 제공. secret 없으면 [SKIP].
          python -u scripts/send_weekly_digest.py "$ARG" || true

      # ── 자가치유 보고 (2026-07-24) ──────────────────────────────────────
      - name: 자가치유 보고
        if: always()
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_FILE: weekly-digest.yml
          PYTHONIOENCODING: utf-8
        run: python scripts/자가치유.py --이름 "주간 다이제스트" --결과 ${{ job.status }} --크론 "0 22 * * 0"
