name: telegram-qa

# M11+M12: 양방향 Q&A 봇 — long-poll 루프로 메시지 즉시(몇 초) 답장.
# 한 run 이 QA_LOOP_SECONDS(기본 4h) 동안 듣고 종료 → cron `*/5` 가 큐에 대기시킨 다음 run 이 이어받음.
# 공개 repo = Actions 무료·무제한. offset = 텔레그램 서버측 ack(스크립트 내부). 사장님만 응답. 실패 비차단.

on:
  schedule:
    - cron: '*/5 * * * *'   # 다음 run 을 큐에 항상 대기시켜 끊김 없는 핸드오프(cancel-in-progress=false)
  workflow_dispatch: {}

permissions:
  actions: read     # rank-check sheet-backup artifact 다운로드
  contents: read
  issues: write

concurrency:
  group: telegram-qa
  cancel-in-progress: false   # 실행 중 run 은 유지, 새 run 은 1개만 대기 → 종료 즉시 이어받기

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 290   # 루프 예산(4h) 여유 + Actions 6h 하드한도 안전 backstop
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.13'

      - name: Poll & answer
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}   # 자연어 이해(무료 LLM). 미설정 시 키워드 매칭으로 폴백.
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PYTHONIOENCODING: 'utf-8'
        run: python -u scripts/telegram_qa_bot.py || true

      # ── 자가치유 보고 (2026-07-24) ──────────────────────────────────────
      - name: 자가치유 보고
        if: always()
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_FILE: telegram-qa.yml
          PYTHONIOENCODING: utf-8
        run: python scripts/자가치유.py --이름 "텔레그램 Q&A 봇" --결과 ${{ job.status }} --크론 "*/5 * * * *"
