name: 발행검수
# 발행 검수 — 매일 1회. 시트 링크 → 카페 글 수집 → 채점 → '발행 검수' 탭 기록.
# 사장님 승인(2026-07-23): "전체로 자동으로 시트에 반영까지 해서 ㄱㄱ 매일 1번씩"
#
# 시간: KST 04:00 (= UTC 19:00 전날). 전날 발행분의 댓글이 다 달린 뒤에 재기 위함.
# 쓰기 범위: **'발행 검수' 탭에만** 쓴다. 기존 탭은 건드리지 않는다.
# 차단 회피: 레포 표준(curl_cffi chrome131 + 3.5~5초 간격).

on:
  schedule:
    - cron: '0 19 * * *'      # KST 04:00
  workflow_dispatch:
    inputs:
      limit:
        description: '검수할 글 수'
        required: false
        default: '60'
      write:
        description: "시트에 쓸까요 (1=쓴다 / 0=결과만 보고 안 씀)"
        required: false
        default: '1'
      notify:
        description: "텔레그램으로 보고할까요 (1=보낸다 / 0=안 보냄)"
        required: false
        default: '1'

concurrency:
  group: balhaeng-geomsu
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ github.token }}

      - name: Setup Python 3.13
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.13'

      - name: Setup venv + install deps
        shell: bash
        run: |
          python -m venv .venv
          ./.venv/bin/python -m pip install --upgrade pip
          ./.venv/bin/python -m pip install -r requirements.txt

      # 검수 결과 보고(매일)와 고장 경보를 이 스텝 안에서 스스로 보낸다.
      # 아래 'Notify on failure' 는 파이썬이 아예 못 뜬 경우만 받는 마지막 그물이다.
      - name: Run 발행 검수
        id: audit
        shell: bash
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEOMSU_LIMIT: ${{ github.event.inputs.limit || '150' }}
          GEOMSU_WRITE: ${{ github.event.inputs.write || '1' }}
          GEOMSU_NOTIFY: ${{ github.event.inputs.notify || '1' }}
          # 제한시간(120분)에 걸려 '취소'로 끝나면 알림이 한 통도 안 나간다.
          # 그 전에 스크립트가 스스로 끊고 남은 건수를 보고에 적는다.
          GEOMSU_DEADLINE_MIN: '90'
          PYTHONIOENCODING: 'utf-8'
        run: |
          set -o pipefail
          ./.venv/bin/python -u -m scripts.balhaeng_geomsu 2>&1 | tee geomsu.log

      # 스크립트가 스스로 알리지 못한 경우(설치 실패·제한시간 초과로 취소·강제중단)
      # 만 여기서 알린다. ★`failure()` 는 '취소'에서 돌지 않는다 — 제한시간을 넘겨
      # 취소로 끝나는 날이 바로 알아야 하는 날이라 `!cancelled()` 로 넓힌다
      # (이 레포 rank-check.yml 이 같은 이유로 쓰는 방식).
      # ★"로그를 확인해 주세요" 만 보내지 않는다 — 마지막 기록을 같이 보낸다.
      - name: Notify on failure
        if: ${{ !cancelled() && steps.audit.outcome != 'success' }}
        continue-on-error: true
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PYTHONIOENCODING: 'utf-8'
        run: |
          if [ -f .geomsu_alerted ]; then
            echo "이미 이유를 담아 알렸다 — 두 번 보내지 않는다"
            exit 0
          fi
          # ★venv 설치가 깨진 경우가 바로 이 알림이 가장 필요한 때다.
          #   .venv 를 쓰면 그때 알림도 같이 죽는다 → 시스템 파이썬으로 보낸다
          #   (src/notify 는 표준 라이브러리만 쓴다).
          python - <<'PY' || true
          import os
          from src.notify import send_report
          꼬리 = ""
          try:
              with open("geomsu.log", encoding="utf-8", errors="replace") as f:
                  줄 = [x.rstrip() for x in f if x.strip()]
              꼬리 = "\n".join(줄[-8:])
          except Exception:
              꼬리 = "(로그 파일이 남지 않았습니다 — 파이썬이 뜨기 전에 멈춘 것)"
          send_report("🚨 발행 검수가 중간에 멈췄습니다\n"
                      f"마지막 기록:\n{꼬리}\n\n{os.environ.get('RUN_URL','')}")
          PY
