name: 경쟁사-댓글-제품명

# 키워드 검색 → 상위노출된 남의 글 → 댓글 → 경쟁 제품명·횟수 → 시트 '경쟁사'
#
# 사장님 정의(2026-07-23): 경쟁사 = 남의 글 댓글에서 팔리는 **제품**(카페 이름이 아님).
# 여기(Actions)서 도는 이유: 카페 댓글 접근이 되고(2026-07-23 실증), 제품명 판정용
# Groq 키가 여기 있다. 사장님 PC 에서는 둘 다 안 된다.

on:
  # 매일 1회 (KST 05:00). 순위 검사(KST 00·06·12·18시)와 겹치지 않는 시간대.
  # 댓글은 순위만큼 자주 바뀌지 않아 하루 1번이면 충분하다.
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 제품군마다 볼 키워드 수 (0 = 전체)
        default: '0'
      top_posts:
        description: 키워드마다 볼 남의 글 수
        default: '4'
      write_sheet:
        description: 시트에 쓸지 (false 면 로그로만 확인)
        default: 'true'

concurrency:
  group: competitor-comments
  cancel-in-progress: false

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      # ★job 레벨 permissions 는 top-level 을 '병합' 이 아니라 **대체**한다.
      #   여기 안 적힌 스코프는 none 이 되므로, 위에 적어둔 actions·issues 를
      #   여기에도 다시 써야 자가치유가 로그를 읽고 이슈를 열 수 있다(독립검토 H-2).
      contents: write        # 판정 결과(data/brand_verdicts.json)를 되돌려 저장한다
      actions: read          # 자가치유: 최근 run·실패 로그 조회
      issues: write          # 자가치유: 3회 연속 실패 시 확인용 이슈
    # 전체 키워드(약 400개) × 글 4개 = 90분 안팎. 넉넉히 잡되 무한정 돌지는 않게.
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Setup venv + install deps
        run: |
          python -m venv .venv
          ./.venv/bin/pip install -q --upgrade pip
          ./.venv/bin/pip install -q -r requirements.txt

      - name: Collect competitor products from comments
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          CAFE_WHITELIST_SLUGS: ${{ secrets.CAFE_WHITELIST_SLUGS }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}   # 제품명 판정. 없으면 규칙으로 폴백
          NAVER_SLOWDOWN_BASE_SEC: '4.0'
          PYTHONIOENCODING: 'utf-8'
        run: |
          # 예약 실행(schedule)은 inputs 가 비어 있다 → 전체 키워드·시트 기록이 기본.
          ./.venv/bin/python -u -m scripts.collect_comment_brands \
            --from-sheet \
            --limit "${{ inputs.limit || '0' }}" \
            --top-posts "${{ inputs.top_posts || '4' }}" \
            --mentions-file mentions.json \
            ${{ (inputs.write_sheet == 'false') && ' ' || '--write-sheet' }}

      # 댓글 훑기가 이 작업의 45분이다. 판정만 실패했을 때 다시 훑지 않도록 남겨둔다.
      - name: 모아둔 댓글 보관
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mentions
          path: mentions.json
          retention-days: 3
          if-no-files-found: ignore

      # 한 번 내린 제품 판정은 남긴다 — 다음 run 은 새로 나온 이름만 물어본다.
      # (Groq 무료 하루치를 아끼는 핵심. 사장님이 파일에서 직접 고칠 수도 있다.)
      - name: 제품 판정 저장
        if: always()
        run: |
          if [ -n "$(git status --porcelain data/brand_verdicts.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/brand_verdicts.json
            git commit -m "chore(경쟁사): 제품명 판정 갱신 [skip ci]"
            git pull --rebase --autostash origin main || true
            git push origin HEAD:main || true
          fi

      # 조용히 실패하면 사장님은 어제 표를 오늘 것으로 믿게 된다 → 실패는 반드시 알린다.
      # 판정이 많이 비어 시트를 건너뛴 경우(종료코드 3)도 여기로 온다.
      - name: 실패 알림
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=❌ 경쟁사 댓글 수집 실패 — 시트 '경쟁사' 는 어제 값 그대로입니다. 다음 예약(내일 05시)에 다시 시도합니다." \
              > /dev/null || true
          fi

      # ── 자가치유 보고 (2026-07-24) ──────────────────────────────────────
      - name: 자가치유 보고
        if: always()
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_FILE: competitor-comments.yml
          PYTHONIOENCODING: utf-8
        run: python scripts/자가치유.py --이름 "댓글 경쟁제품 수집" --결과 ${{ job.status }} --크론 "0 20 * * *"
