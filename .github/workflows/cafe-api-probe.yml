name: cafe-api-probe
# 일회성 검증용 — 네이버 카페글 검색 Open API(cafearticle.json)가 실제로
# 작동하는지 + 본문 제공 범위 + 무료 한도(응답 헤더/total) 를 실호출로 확인.
# 지식인과 동일 키(NAVER_OPENAPI_CLIENT_ID/SECRET) 사용.
on:
  workflow_dispatch:
    inputs:
      keyword:
        description: '검색할 후기/불만 키워드'
        required: false
        default: '헤드앤숄더 후기'

concurrency:
  group: cafe-api-probe
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Python 3.13
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.13'

      - name: Setup venv + install deps
        shell: bash
        run: |
          python -m venv .venv
          ./.venv/bin/python -m pip install --upgrade pip
          ./.venv/bin/python -m pip install -r requirements.txt

      - name: 카페 API 실호출 + 본문범위/한도 확인
        shell: bash
        env:
          NAVER_OPENAPI_CLIENT_ID: ${{ secrets.NAVER_OPENAPI_CLIENT_ID }}
          NAVER_OPENAPI_CLIENT_SECRET: ${{ secrets.NAVER_OPENAPI_CLIENT_SECRET }}
          KW: ${{ inputs.keyword }}
          PYTHONIOENCODING: 'utf-8'
        run: |
          ./.venv/bin/python - <<'PY'
          import os, json
          from curl_cffi import requests
          from src.cafe_collect import fetch_cafe, CAFE_API_URL

          cid = os.environ.get("NAVER_OPENAPI_CLIENT_ID", "")
          csec = os.environ.get("NAVER_OPENAPI_CLIENT_SECRET", "")
          if not (cid and csec):
              print("KEY MISSING"); raise SystemExit(1)

          # 여러 브랜드 키워드로 결과량/본문 확인
          for kw in [os.environ.get("KW") or "헤드앤숄더 후기",
                     "니조랄 부작용", "쿤달 샴푸 후기", "비듬 샴푸 불만", "도브 샴푸 트러블"]:
              items, data = fetch_cafe(kw, client_id=cid, client_secret=csec, display=5, sort="sim")
              total = data.get("total")
              print(f"\n===== '{kw}' : total={total}, returned={len(items)} =====")
              for i, x in enumerate(items[:3], 1):
                  desc = x['description']
                  print(f"  [{i}] title={x['title'][:60]}")
                  print(f"      cafename={x['cafename']}  link={x['link'][:70]}")
                  print(f"      desc_len={len(desc)}  desc={desc[:200]}")

          # 무료 한도(rate-limit) 헤더 직접 확인 — 응답 헤더 raw 출력
          r = requests.get(CAFE_API_URL,
                           headers={"X-Naver-Client-Id": cid, "X-Naver-Client-Secret": csec},
                           params={"query": "헤드앤숄더", "display": 1})
          print("\n===== RAW RESPONSE HEADERS (rate-limit 단서) =====")
          for k, v in r.headers.items():
              kl = k.lower()
              if any(t in kl for t in ("rate", "limit", "quota", "remain", "x-")):
                  print(f"  {k}: {v}")
          # display 상한 검증: 101 요청 시 거부/클램프 확인
          r2 = requests.get(CAFE_API_URL,
                            headers={"X-Naver-Client-Id": cid, "X-Naver-Client-Secret": csec},
                            params={"query": "샴푸", "display": 100})
          print(f"\n===== display=100 → HTTP {r2.status_code}, total={ (r2.json() or {}).get('total') } =====")
          PY
