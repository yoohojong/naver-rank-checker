name: cafe-material-collect
# 카페외부 원고 '재료' 자동 수집 (C3/C4/C9).
# 사장님 시트의 '카외' 제품 탭 → 단계별 수집(지식인/리뷰) → 수집결과_* 스테이징 탭 적재.
# rank-check.yml 패턴 재활용. 순위체커(rank-check)와 schedule·concurrency 완전 분리.
# ⚠️ 키 없을 때 안전: integration_runner 가 네이버/APIFY 키 없으면 해당 채널만 스킵(에러 X).
#
# ── 병렬(matrix) 가속 (2026-06-23) ────────────────────────────────────────────
#   shards 입력 >1 이면 4·5단계 저점리뷰 키워드(약 506개)를 shards 개 job 으로 동시 분할 수집.
#   실측(GHA): 키워드당 평균 ~27s, 차단 0, job 마다 egress IP 다름(부하 분산). shards=12 → ~30분에 전수.
#   shards=1(기본) 이면 종전 단일 job(지식인+리뷰) 그대로. 분할 시엔 지식인 키 미주입(12× 중복수집 방지).
#   분할은 md5 해시 disjoint + 이어받기(이미 적재 스킵) → 동시/재실행해도 중복 0(멱등).

on:
  # 2026-06-21 사장님 결정(D-062): 자동(cron) 실행 중지(수동 게이트). 활성화 시 cron 복구 가능.
  # schedule:
  #   - cron: '0 12 * * 1'   # (보존용 주석: 매주 월 KST 21:00)
  workflow_dispatch:  # 수동 전용 (cron 비활성 — 사장님 활성화 결정 전까지)
    inputs:
      shards:
        description: '병렬 분할 수(=동시 job 수). 1=단일(종전). 12 권장(≈30분 전수). Free 동시한도 20.'
        required: false
        default: '1'
      review_brands:
        description: '저점리뷰 대상 브랜드 한정(콤마구분). 비우면 4·5단계 전부(전수). 대표 소수 실증 시만 채움.'
        required: false
        default: ''
      review_keyword_budget:
        description: '단일(shards=1) 모드의 run 당 새 키워드 상한(타임아웃 회피). 0=무제한. 기본 22. (matrix 모드선 무시)'
        required: false
        default: '22'
      review_max:
        description: '키워드당 저점리뷰 목표 건수. 기본 100.'
        required: false
        default: '100'

# 순위체커(naver-rank-check)와 별도 그룹 — 서로 취소/대기 영향 없음.
concurrency:
  group: cafe-material-collect
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # shards 입력 → [0,1,...,N-1] JSON 배열(matrix 동적 생성). shards=1 이면 [0] = 단일 job.
  prep:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      shards: ${{ steps.mk.outputs.shards }}
    steps:
      - name: shard 인덱스 배열 생성
        id: mk
        shell: bash
        env:
          N: ${{ github.event.inputs.shards }}
        run: |
          python3 -c "import json,os; n=max(1,int(os.environ.get('N') or '1')); print('shards='+json.dumps(list(range(n))))" >> "$GITHUB_OUTPUT"
          python3 -c "import os; n=max(1,int(os.environ.get('N') or '1')); print(('단일 모드(1 job)' if n==1 else f'병렬 모드 — {n} job 동시'))"

  collect:
    needs: prep
    runs-on: ubuntu-latest
    # 50분 = GHA 60분 한도 안전마진. matrix 면 shard 당 키워드가 적어 한참 남음.
    timeout-minutes: 50
    strategy:
      fail-fast: false        # 한 shard 실패가 나머지를 취소하지 않게.
      max-parallel: 20        # 계정 동시 job 한도(Free 20)까지. shards 가 작으면 shards 가 상한.
      matrix:
        shard: ${{ fromJSON(needs.prep.outputs.shards) }}

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.ACTIONS_PAT || github.token }}

      - name: Verify checkout
        shell: bash
        run: |
          test -f requirements.txt
          test -f src/integration_runner.py

      # 러너 egress IP — matrix job 들이 서로 다른 IP 인지 확인(네이버 부하 분산 근거).
      - name: 러너 egress IP
        shell: bash
        run: |
          echo "shard=${{ matrix.shard }}/${{ github.event.inputs.shards }} egress_ip=$(curl -s --max-time 10 https://api.ipify.org || echo unknown)"

      - name: Setup Python 3.13
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.13'

      - name: Setup venv + install deps
        shell: bash
        run: |
          python -m venv .venv
          ./.venv/bin/python -m pip install --upgrade pip
          ./.venv/bin/python -m pip install -r requirements.txt

      # 저점리뷰 수집(review_lowstar)은 Playwright 실브라우저(chromium) 필요.
      - name: Install Playwright chromium
        shell: bash
        run: |
          ./.venv/bin/python -m playwright install --with-deps chromium

      - name: Run cafe material collection
        id: collect
        shell: bash
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          # 지식인(NAVER) 키: 단일 모드(shards=1)에서만 주입. 분할 모드선 미주입 → 지식인 중복수집 방지(리뷰만).
          NAVER_OPENAPI_CLIENT_ID: ${{ github.event.inputs.shards == '1' && secrets.NAVER_OPENAPI_CLIENT_ID || '' }}
          NAVER_OPENAPI_CLIENT_SECRET: ${{ github.event.inputs.shards == '1' && secrets.NAVER_OPENAPI_CLIENT_SECRET || '' }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          APIFY_ACTOR_ID: ${{ secrets.APIFY_ACTOR_ID }}
          REVIEW_BRAND_WHITELIST: ${{ github.event.inputs.review_brands }}
          # 이 job 이 처리할 분할: "i/N". shards=1 이면 "0/1" → 분할 없음(전부 처리).
          REVIEW_SHARD: ${{ matrix.shard }}/${{ github.event.inputs.shards }}
          # 예산: 분할 모드선 0(무제한 — shard 가 이미 키워드 수를 제한). 단일 모드선 입력값(기본 22).
          REVIEW_KEYWORD_BUDGET: ${{ github.event.inputs.shards == '1' && github.event.inputs.review_keyword_budget || '0' }}
          REVIEW_MAX: ${{ github.event.inputs.review_max }}
          # 텔레그램: 단일 모드에서만(분할 모드선 12× 알림 폭주 방지 — 요약은 run 로그로).
          TELEGRAM_BOT_TOKEN: ${{ github.event.inputs.shards == '1' && secrets.TELEGRAM_BOT_TOKEN || '' }}
          TELEGRAM_CHAT_ID: ${{ github.event.inputs.shards == '1' && secrets.TELEGRAM_CHAT_ID || '' }}
          PYTHONIOENCODING: 'utf-8'
        run: |
          ./.venv/bin/python -u -m src.integration_runner

      # C9: 백업 알림 — 단일 모드에서만(분할 모드선 shard 마다 알림 폭주 방지).
      - name: Send Telegram notification (수집 결과 백업 알림)
        if: ${{ always() && github.event.inputs.shards == '1' }}
        continue-on-error: true
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_STATUS: ${{ steps.collect.outcome }}
          PYTHONIOENCODING: 'utf-8'
        run: |
          ./.venv/bin/python - <<'PY' || true
          import os
          from src.notify import send_report
          status = os.environ.get("RUN_STATUS", "unknown")
          mark = "✅ 성공" if status == "success" else f"⚠️ {status}"
          send_report(f"[카페외부 재료수집] 종료 — {mark}")
          PY
