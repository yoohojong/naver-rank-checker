name: 발행검수-진단
# 임시 진단 — 왜 대상이 6건뿐이고 왜 전건 불합격인가. 읽기 전용(시트에 아무것도 쓰지 않음).
# 원인 확정 후 이 워크플로와 scripts/probe_geomsu_diag.py 는 지운다.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: '검수할 글 수'
        required: false
        default: '20'

concurrency:
  group: balhaeng-geomsu-diag
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ github.token }}

      - name: Setup Python 3.13
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.13'

      - name: Setup venv + install deps
        shell: bash
        run: |
          python -m venv .venv
          ./.venv/bin/python -m pip install --upgrade pip
          ./.venv/bin/python -m pip install -r requirements.txt

      - name: Diagnose
        shell: bash
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          GEOMSU_LIMIT: ${{ github.event.inputs.limit || '20' }}
          PYTHONIOENCODING: 'utf-8'
        run: |
          ./.venv/bin/python -u -m scripts.probe_geomsu_diag
